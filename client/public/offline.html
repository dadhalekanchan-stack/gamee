<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academia Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #1f3d87 0%, #0a1638 45%, #050b1c 100%);
        color: #e8f0ff;
        font-family: Arial, sans-serif;
      }
      .card {
        width: min(92vw, 540px);
        border: 2px solid #74b9ff;
        background: rgba(7, 10, 18, 0.82);
        padding: 22px;
        text-align: center;
      }
      h1 {
        margin: 0 0 12px;
        color: #ffe28a;
        font-size: 30px;
      }
      p {
        margin: 8px 0;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Offline Mode</h1>
      <p>Academia was opened without internet.</p>
      <p>Reconnect to sync account, battles, and progress.</p>
    </main>
  </body>
</html>
